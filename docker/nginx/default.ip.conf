server {
    listen 80;
    server_name _;

    # Frontend build output
    root /var/www/client/dist;
    index index.html;

    # -----------------------------
    # Mercure
    # -----------------------------
    location /.well-known/mercure {
        proxy_pass http://mercure/.well-known/mercure;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # -----------------------------
    # Symfony API
    # -----------------------------
    location ^~ /api/ {
        include fastcgi_params;
        fastcgi_pass php:9000;

        # Always execute Symfony front controller
        fastcgi_param SCRIPT_FILENAME /var/www/server/public/index.php;
        fastcgi_param DOCUMENT_ROOT /var/www/server/public;
        fastcgi_param SCRIPT_NAME /index.php;

        # Forward original request info
        fastcgi_param REQUEST_URI $request_uri;
        fastcgi_param QUERY_STRING $query_string;
        fastcgi_param REQUEST_METHOD $request_method;
        fastcgi_param CONTENT_TYPE $content_type;
        fastcgi_param CONTENT_LENGTH $content_length;
    }

    # -----------------------------
    # Symfony profiler
    # -----------------------------
    location ^~ /_profiler/ {
        include fastcgi_params;
        fastcgi_pass php:9000;

        fastcgi_param SCRIPT_FILENAME /var/www/server/public/index.php;
        fastcgi_param DOCUMENT_ROOT /var/www/server/public;
        fastcgi_param SCRIPT_NAME /index.php;

        fastcgi_param REQUEST_URI $request_uri;
        fastcgi_param QUERY_STRING $query_string;
        fastcgi_param REQUEST_METHOD $request_method;
        fastcgi_param CONTENT_TYPE $content_type;
        fastcgi_param CONTENT_LENGTH $content_length;
    }

    # Optional: Symfony debug toolbar assets / profiler-related routes
    location ^~ /_wdt/ {
        include fastcgi_params;
        fastcgi_pass php:9000;

        fastcgi_param SCRIPT_FILENAME /var/www/server/public/index.php;
        fastcgi_param DOCUMENT_ROOT /var/www/server/public;
        fastcgi_param SCRIPT_NAME /index.php;

        fastcgi_param REQUEST_URI $request_uri;
        fastcgi_param QUERY_STRING $query_string;
        fastcgi_param REQUEST_METHOD $request_method;
        fastcgi_param CONTENT_TYPE $content_type;
        fastcgi_param CONTENT_LENGTH $content_length;
    }

    # Never execute arbitrary PHP files from the frontend root
    location ~ \.php$ {
        return 404;
    }

    # -----------------------------
    # Frontend SPA
    # -----------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }
}